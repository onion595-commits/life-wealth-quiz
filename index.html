<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人生財富測驗</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf8;
    --surface: #ffffff;
    --surface2: #f3f2ee;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9b9b96;
    --radius: 12px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #18181a;
      --surface: #232325;
      --surface2: #2c2c2e;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --text: #f0f0ec;
      --text2: #a0a09a;
      --text3: #686864;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  /* Header */
  .header { margin-bottom: 2rem; }
  .header h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 0.4rem; }
  .header p { font-size: 14px; color: var(--text2); line-height: 1.7; }

  .scale-row {
    display: flex; gap: 6px; flex-wrap: wrap; margin-top: 1rem;
  }
  .scale-pill {
    font-size: 12px; color: var(--text2);
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
  }

  /* Progress */
  .progress-wrap { margin-bottom: 1.5rem; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); margin-bottom: 6px; }
  .progress-track { height: 4px; background: var(--surface2); border-radius: 2px; }
  .progress-fill { height: 4px; background: #534AB7; border-radius: 2px; transition: width 0.3s; }

  /* Section Card */
  .section-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .section-head {
    display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem;
  }
  .section-icon {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0;
  }
  .section-name { font-size: 15px; font-weight: 600; }
  .section-badge {
    margin-left: auto; font-size: 12px; color: var(--text2);
    background: var(--surface2); border-radius: 20px;
    padding: 3px 10px; border: 0.5px solid var(--border);
    font-variant-numeric: tabular-nums;
  }

  /* Question */
  .q-row { margin-bottom: 1.25rem; }
  .q-row:last-child { margin-bottom: 0; }
  .q-text { font-size: 14px; color: var(--text); line-height: 1.65; margin-bottom: 4px; }
  .q-note { font-size: 12px; color: var(--text3); margin-bottom: 8px; }
  .rating-row { display: flex; gap: 6px; }
  .rating-btn {
    width: 42px; height: 42px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    display: flex; align-items: center; justify-content: center;
  }
  .rating-btn:hover { background: var(--surface2); color: var(--text); }
  .rating-btn.selected { color: #fff; border-color: transparent; }

  /* Submit */
  .submit-btn {
    width: 100%; padding: 13px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    font-size: 15px; font-weight: 500;
    cursor: pointer;
    margin-top: 1.25rem;
    transition: background 0.12s;
  }
  .submit-btn:hover:not(:disabled) { background: var(--surface2); }
  .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Result */
  #result { display: none; }
  #result.visible { display: block; }

  .total-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.75rem 1.25rem;
    text-align: center;
    margin-bottom: 1.25rem;
  }
  .total-num { font-size: 56px; font-weight: 600; letter-spacing: -2px; line-height: 1; }
  .total-denom { font-size: 22px; color: var(--text3); font-weight: 400; }
  .total-label { font-size: 13px; color: var(--text3); margin-top: 4px; }
  .total-desc { font-size: 15px; font-weight: 500; margin-top: 10px; }

  /* Pentagon chart */
  .pentagon-wrap {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }
  .section-sub { font-size: 13px; color: var(--text3); margin-bottom: 1rem; }
  #pentagon-canvas { display: block; width: 100%; max-width: 360px; margin: 0 auto; }

  /* Score bars */
  .bars-wrap {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }
  .bar-row { margin-bottom: 14px; }
  .bar-row:last-child { margin-bottom: 0; }
  .bar-meta { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
  .bar-name { font-weight: 500; }
  .bar-score { color: var(--text3); font-variant-numeric: tabular-nums; }
  .bar-track { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 8px; border-radius: 4px; transition: width 0.9s cubic-bezier(0.16, 1, 0.3, 1); }

  /* Insights */
  .insights-wrap {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }
  .insight-item {
    display: flex; gap: 10px; margin-bottom: 12px;
    padding-bottom: 12px; border-bottom: 0.5px solid var(--border);
  }
  .insight-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .insight-icon { font-size: 17px; flex-shrink: 0; margin-top: 1px; }
  .insight-text { font-size: 13px; color: var(--text2); line-height: 1.65; }
  .insight-text strong { color: var(--text); font-weight: 500; }

  .card-title { font-size: 13px; font-weight: 600; color: var(--text3); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 1rem; }

  .retry-btn {
    width: 100%; padding: 11px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    background: transparent; color: var(--text2);
    font-size: 14px; cursor: pointer;
    margin-top: 0.5rem;
  }
  .retry-btn:hover { background: var(--surface2); }
</style>
</head>
<body>
<div class="container">

  <!-- Quiz -->
  <div id="quiz">
    <div class="header">
      <h1>人生財富測驗</h1>
      <p>請依照你的真實狀態，為每道題目評分。填完後會產生你的五大財富圖像。</p>
      <div class="scale-row">
        <span class="scale-pill">0 非常不同意</span>
        <span class="scale-pill">1 不同意</span>
        <span class="scale-pill">2 普通</span>
        <span class="scale-pill">3 同意</span>
        <span class="scale-pill">4 非常同意</span>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="progress-text">0 / 25 題已作答</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>

    <div id="form-body"></div>

    <button class="submit-btn" id="submit-btn" onclick="showResult()" disabled>
      查看我的人生財富報告 →
    </button>
  </div>

  <!-- Result -->
  <div id="result">
    <div class="header" style="margin-bottom:1.25rem;">
      <h1>你的人生財富報告</h1>
    </div>

    <div class="total-card">
      <div>
        <span class="total-num" id="total-num">—</span>
        <span class="total-denom"> / 100</span>
      </div>
      <div class="total-label">人生財富總分</div>
      <div class="total-desc" id="total-desc"></div>
    </div>

    <div class="pentagon-wrap">
      <div class="card-title">五大財富分佈</div>
      <canvas id="pentagon-canvas" width="360" height="340"></canvas>
    </div>

    <div class="bars-wrap">
      <div class="card-title">各領域得分</div>
      <div id="bar-list"></div>
    </div>

    <div class="insights-wrap">
      <div class="card-title">個人洞察</div>
      <div id="insight-list"></div>
    </div>

    <button class="retry-btn" onclick="resetQuiz()">↩ 重新作答</button>
  </div>

</div>
<script>
const SECTIONS = [
  {
    id:'time', title:'時間財富', icon:'⏳',
    color:'#534AB7', bg:'#EEEDFE', darkBg:'#2e2a5a',
    qs:[
      {t:'我很清楚人生時間有限，因此會更認真思考什麼值得投入。'},
      {t:'我知道現階段人生中，最重要的幾件事情是什麼。'},
      {t:'我能把注意力放在真正重要的事情上，而不是一直被打斷。'},
      {t:'我不太會因為忙碌、焦慮或分心，而忽略真正重要的事。'},
      {t:'大多數時候，我能主動安排自己的時間與生活節奏。'}
    ]
  },
  {
    id:'social', title:'社會財富', icon:'🤝',
    color:'#0F6E56', bg:'#E1F5EE', darkBg:'#0d3326',
    qs:[
      {t:'我擁有幾段能彼此支持、信任與真誠交流的關係。'},
      {t:'我認為自己有能力成為一個可靠的伴侶、家人或朋友。'},
      {t:'我身邊有一些人，能帶給我新的觀點、刺激與成長。'},
      {t:'我對某些比個人更大的事物，有深刻的連結感與認同感。', note:'（例如：土地、文化、信仰、理念、社群、創作、時代議題等）'},
      {t:'我不太需要透過外在成就、消費或他人眼光，來證明自己的價值。'}
    ]
  },
  {
    id:'mental', title:'心理財富', icon:'🧠',
    color:'#993556', bg:'#FBEAF0', darkBg:'#3d1525',
    qs:[
      {t:'我對世界仍保有好奇心與探索慾望。'},
      {t:'我對自己的人生方向，有某種長期想前進的目標或感覺。'},
      {t:'我願意持續學習、成長，並發揮自己的潛力。'},
      {t:'面對困難時，我通常願意調整、學習，而不是停在原地。'},
      {t:'我有屬於自己的方式，能整理情緒、思考人生與恢復能量。'}
    ]
  },
  {
    id:'body', title:'身體財富', icon:'💪',
    color:'#3B6D11', bg:'#EAF3DE', darkBg:'#1a3008',
    qs:[
      {t:'以目前年紀來說，我覺得自己的身體狀態算健康、有活力。'},
      {t:'我有持續照顧自己的身體與生活習慣。'},
      {t:'我的飲食大致是穩定、天然，而不是長期失控或混亂。'},
      {t:'我通常能獲得足夠睡眠與休息。'},
      {t:'我有意識地在累積未來的健康，而不只是處理當下疲勞。'}
    ]
  },
  {
    id:'money', title:'金錢財富', icon:'💰',
    color:'#BA7517', bg:'#FAEEDA', darkBg:'#3d2608',
    qs:[
      {t:'我知道「對我來說，多少才算夠」這件事。'},
      {t:'我的收入能力，整體來說有持續成長。'},
      {t:'我的支出大致可控，不太會長期失衡。'},
      {t:'我有逐步建立長期資產，而不只是賺了就花掉。'},
      {t:'我希望金錢不只是消費工具，而是能支持人生自由與其他重要價值。'}
    ]
  }
];

const answers = {};
let answered = 0;
const TOTAL = 25;

const isDark = () => window.matchMedia('(prefers-color-scheme: dark)').matches;

function buildForm() {
  const body = document.getElementById('form-body');
  body.innerHTML = '';
  SECTIONS.forEach(sec => {
    const card = document.createElement('div');
    card.className = 'section-card';
    const bg = isDark() ? sec.darkBg : sec.bg;
    card.innerHTML = `
      <div class="section-head">
        <div class="section-icon" style="background:${bg};">${sec.icon}</div>
        <span class="section-name">${sec.title}</span>
        <span class="section-badge" id="badge-${sec.id}">0 / 20</span>
      </div>`;
    sec.qs.forEach((q, qi) => {
      const key = `${sec.id}_${qi}`;
      const row = document.createElement('div');
      row.className = 'q-row';
      row.innerHTML = `
        <p class="q-text">${qi + 1}. ${q.t}</p>
        ${q.note ? `<p class="q-note">${q.note}</p>` : ''}
        <div class="rating-row" id="rr-${key}">
          ${[0,1,2,3,4].map(v=>`<button class="rating-btn" onclick="pick('${key}',${v},this)">${v}</button>`).join('')}
        </div>`;
      card.appendChild(row);
    });
    body.appendChild(card);
  });
}

function pick(key, val, btn) {
  const secId = key.split('_')[0];
  const wasNew = !(key in answers);
  answers[key] = val;
  if (wasNew) { answered++; updateProgress(); }
  const row = document.getElementById('rr-' + key);
  const sec = SECTIONS.find(s => s.id === secId);
  row.querySelectorAll('.rating-btn').forEach(b => {
    const bv = parseInt(b.textContent);
    if (bv === val) { b.classList.add('selected'); b.style.background = sec.color; }
    else { b.classList.remove('selected'); b.style.background = ''; }
  });
  updateBadge(secId);
  document.getElementById('submit-btn').disabled = answered < TOTAL;
}

function updateProgress() {
  const pct = Math.round(answered / TOTAL * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${answered} / ${TOTAL} 題已作答`;
  document.getElementById('progress-pct').textContent = pct + '%';
}

function updateBadge(secId) {
  const sec = SECTIONS.find(s => s.id === secId);
  let t = 0;
  sec.qs.forEach((_, i) => { const k = `${secId}_${i}`; if (k in answers) t += answers[k]; });
  document.getElementById('badge-' + secId).textContent = t + ' / 20';
}

function getScores() {
  return SECTIONS.map(sec => {
    let score = 0;
    sec.qs.forEach((_, i) => { const k = `${sec.id}_${i}`; if (k in answers) score += answers[k]; });
    return { ...sec, score };
  });
}

function getDesc(t) {
  if (t >= 85) return '財富豐盛 · 持續耕耘';
  if (t >= 70) return '根基穩健 · 仍有空間深化';
  if (t >= 55) return '部分領域建立，值得更多關注';
  if (t >= 40) return '有意識的起點，從核心領域開始';
  return '覺察本身就是改變的開始';
}

function getInsight(sec) {
  const p = sec.score / 20;
  if (p >= 0.85) return `<strong>${sec.title}</strong>已有穩固基礎，繼續維持並深化現有的好習慣。`;
  if (p >= 0.65) return `<strong>${sec.title}</strong>有不錯的基礎，仍有幾個面向值得更多投入與覺察。`;
  if (p >= 0.45) return `<strong>${sec.title}</strong>是值得優先關注的領域，小步驟的持續行動往往帶來最大改變。`;
  return `<strong>${sec.title}</strong>是目前最需要照顧的部分，不妨從最簡單的一個行動開始。`;
}

/* ── Pentagon Chart ─────────────────────────────── */
function drawPentagon(scores) {
  const canvas = document.getElementById('pentagon-canvas');
  const dpr = window.devicePixelRatio || 1;
  const W = 360, H = 340;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const dark = isDark();
  const cx = W / 2, cy = H / 2 + 10;
  const R = 110;
  const n = 5;
  const startAngle = -Math.PI / 2;
  const LEVELS = [4, 8, 12, 16, 20];
  const MAX = 20;

  function pt(i, r) {
    const a = startAngle + (2 * Math.PI * i / n);
    return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
  }

  ctx.clearRect(0, 0, W, H);

  // Grid pentagons
  LEVELS.forEach((lvl, li) => {
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const p = pt(i, R * lvl / MAX);
      i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
    }
    ctx.closePath();
    ctx.strokeStyle = dark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)';
    ctx.lineWidth = li === LEVELS.length - 1 ? 1 : 0.5;
    ctx.stroke();

    // Level label on right axis
    const lp = pt(1, R * lvl / MAX);
    ctx.fillStyle = dark ? 'rgba(255,255,255,0.25)' : 'rgba(0,0,0,0.25)';
    ctx.font = '10px -apple-system, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(lvl, lp.x + 4, lp.y + 3);
  });

  // Axis lines
  for (let i = 0; i < n; i++) {
    const p = pt(i, R);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(p.x, p.y);
    ctx.strokeStyle = dark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Score polygon fill
  ctx.beginPath();
  scores.forEach((s, i) => {
    const frac = s.score / MAX;
    const p = pt(i, R * frac);
    i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
  });
  ctx.closePath();
  ctx.fillStyle = 'rgba(83,74,183,0.18)';
  ctx.fill();

  // Score polygon stroke
  ctx.beginPath();
  scores.forEach((s, i) => {
    const p = pt(i, R * s.score / MAX);
    i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
  });
  ctx.closePath();
  ctx.strokeStyle = '#534AB7';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Dots
  scores.forEach((s, i) => {
    const p = pt(i, R * s.score / MAX);
    ctx.beginPath();
    ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
    ctx.fillStyle = s.color;
    ctx.fill();
    ctx.strokeStyle = dark ? '#232325' : '#fff';
    ctx.lineWidth = 2.5;
    ctx.stroke();
  });

  // Labels
  scores.forEach((s, i) => {
    const labelR = R + 38;
    const p = pt(i, labelR);
    const scoreP = pt(i, R + 22);

    // Icon + name
    ctx.font = `500 13px -apple-system, sans-serif`;
    ctx.fillStyle = dark ? 'rgba(255,255,255,0.85)' : 'rgba(0,0,0,0.75)';

    // Align based on position
    const angle = startAngle + (2 * Math.PI * i / n);
    const cosA = Math.cos(angle);
    let align = 'center';
    if (cosA < -0.3) align = 'right';
    else if (cosA > 0.3) align = 'left';
    ctx.textAlign = align;

    // Score number near dot
    ctx.font = `600 12px -apple-system, sans-serif`;
    ctx.fillStyle = s.color;
    ctx.textAlign = 'center';
    ctx.fillText(s.score, scoreP.x, scoreP.y - 10);

    // Category name
    ctx.font = `500 13px -apple-system, sans-serif`;
    ctx.fillStyle = dark ? 'rgba(255,255,255,0.82)' : 'rgba(0,0,0,0.72)';
    ctx.textAlign = align;
    ctx.fillText(s.icon + ' ' + s.title, p.x, p.y);
  });
}

/* ── Show Result ─────────────────────────────────── */
function showResult() {
  document.getElementById('quiz').style.display = 'none';
  const result = document.getElementById('result');
  result.classList.add('visible');

  const scores = getScores();
  const total = scores.reduce((a, s) => a + s.score, 0);

  document.getElementById('total-num').textContent = total;
  document.getElementById('total-desc').textContent = getDesc(total);

  const barList = document.getElementById('bar-list');
  barList.innerHTML = '';
  scores.forEach(s => {
    const pct = Math.round(s.score / 20 * 100);
    barList.innerHTML += `
      <div class="bar-row">
        <div class="bar-meta">
          <span class="bar-name">${s.icon} ${s.title}</span>
          <span class="bar-score">${s.score} / 20 &nbsp;(${pct}%)</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:0%; background:${s.color};" data-w="${pct}"></div>
        </div>
      </div>`;
  });

  const insightList = document.getElementById('insight-list');
  insightList.innerHTML = scores.map(s => `
    <div class="insight-item">
      <span class="insight-icon">${s.icon}</span>
      <span class="insight-text">${getInsight(s)}</span>
    </div>`).join('');

  // Animate bars
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.querySelectorAll('.bar-fill').forEach(el => {
        el.style.width = el.dataset.w + '%';
      });
    });
  });

  // Draw pentagon
  requestAnimationFrame(() => { drawPentagon(scores); });

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetQuiz() {
  Object.keys(answers).forEach(k => delete answers[k]);
  answered = 0;
  document.getElementById('result').classList.remove('visible');
  document.getElementById('quiz').style.display = '';
  buildForm();
  updateProgress();
  document.getElementById('submit-btn').disabled = true;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildForm();
</script>
</body>
</html>
